# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build All Projects

# Which actions trigger workflow
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# All builds to test
jobs:
  build-1_12:
    name: Build 1.12

    # Which operating system to test on
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Sets working directory to the 1.12 Project
    defaults:
      run:
        working-directory: ./1.12

    # Workflow stages
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      # Attempts to build project
      - name: Build
        run: ./gradlew build

  build-1_16:
    name: Build 1.16

    # Which operating system to test on
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Sets working directory to the 1.16 Project
    defaults:
      run:
        working-directory: ./1.16

    # Workflow stages
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      # Attempts to build project
      - name: Download Assets
        run: ./gradlew downloadAssets

      - name: Run Forge Datagen
        run: ./gradlew forge:runDatagen

      - name: Build Fabric
        run: ./gradlew fabric:build

      - name: Build Forge
        run: ./gradlew forge:build


# This is a placeholder to enable manual activation on dev branch
name: Build All Projects

# Which actions trigger workflow
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  publish:
    name: Build

    # Which operating system to test on
    runs-on: ubuntu-latest
    permissions:
      contents: write
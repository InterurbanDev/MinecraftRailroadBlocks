# This is a placeholder to enable manual activation on dev branch
name: Publish All Projects

# Which actions trigger workflow
on:
  workflow_run:
    workflows: [ "Build All Projects" ]
    types:
      - completed
    branches: [ "main", "dev" ]
  workflow_dispatch:

jobs:
  publish:
    name: Publish

    # On workflow_run, only proceed if the build succeeded (skip for manual runs)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    # Which operating system to test on
    runs-on: ubuntu-latest
    permissions:
      contents: write